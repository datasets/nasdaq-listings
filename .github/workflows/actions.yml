name: Nasdaq listing update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run updater
      run: python scripts/process.py

    - name: Push and Commit
      env:
        CI_COMMIT_NAME: "Automated commit"
        CI_COMMIT_EMAIL: "actions@users.noreply.github.com"
        CI_COMMIT_MESSAGE: "Automated commit"
      run: |
        git config --global user.email "${{env.CI_COMMIT_EMAIL}}"
        git config --global user.name "${{env.CI_COMMIT_NAME}}"
        git diff --quiet && echo "No changes to commit" || (git add data/ && git commit -m "${{env.CI_COMMIT_MESSAGE}}" && git push origin main)
